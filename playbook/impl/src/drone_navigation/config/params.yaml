# Drone Navigation Parameters

drone_navigation:
  ros__parameters:
    # Drone ID
    drone_id: "drone_001"
    
    # Flight parameters
    max_altitude: 100.0  # m
    min_altitude: 2.0   # m
    max_speed: 15.0     # m/s
    approach_speed: 3.0 # m/s
    docking_speed: 0.5  # m/s
    
    # Perception
    confidence_threshold: 0.7
    nms_threshold: 0.4
    model_path: "/models/yolov8n.onnx"
    
    # Approach controller
    intercept_distance: 2.0  # m
    approach_height: 3.0     # m
    time_horizon: 30.0        # s
    
    # Battery thresholds
    battery_critical: 15.0   # %
    battery_warning: 25.0   # %
    battery_low: 40.0        # %
    battery_return: 40.0     # %
    
    # Failsafe
    max_altitude_loss: 50.0  # m
    gps_timeout: 5.0         # s
    rc_timeout: 2.0          # s